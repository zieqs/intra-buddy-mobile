name: intra_buddy_mobile_v2
description: "Student-facing mobile app for UniKL internship management"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.12.4
  supabase: ^2.10.4
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3
  dio: ^5.5.0
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  intl: ^0.20.2
  image_picker: ^1.1.0
  file_picker: ^11.0.2
  url_launcher: ^6.3.1
  flutter_dotenv: ^6.0.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0
  riverpod_lint: ^3.1.3
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
